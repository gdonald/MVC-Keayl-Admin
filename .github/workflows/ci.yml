name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        stage: [prove6, behave]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - uses: Raku/setup-raku@v1
        with:
          raku-version: 'latest'
      - name: Raku version
        run: raku --version
      # Drop this step once MVC::Keayl, ORM::ActiveRecord, and ORM::Factory publish to zef.
      - name: Install git-only dependencies
        run: |
          zef install --/test https://github.com/gdonald/Template-HAML.git
          zef install --/test https://github.com/gdonald/BDD-Behave.git
          zef install --/test https://github.com/gdonald/MVC-Keayl.git
          zef install --/test https://github.com/gdonald/ORM-ActiveRecord.git
          zef install --/test https://github.com/gdonald/ORM-Factory.git
      - name: Install Dependencies
        run: zef install --/test --test-depends --deps-only .
      - name: Install App::Prove6
        run: zef install --/test App::Prove6
      - name: Install DBIish
        run: zef install --/test DBIish
      - name: Run ${{ matrix.stage }}
        run: raku test.raku ${{ matrix.stage }}
